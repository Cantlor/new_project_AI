# module_net_train alpha ablation — alpha=0.50 (symmetric)
#
# Purpose: investigate whether symmetric focal BCE (equal foreground/background weight)
# in the extent head eliminates the "too soft / over-inclusive extent" behavior.
#
# Background:
#   The baseline uses focal_bce(alpha=0.25), giving background 3× more gradient weight
#   than foreground. alpha=0.50 removes this bias entirely — foreground field pixels and
#   background pixels receive equal gradient weight. This is the most direct intervention
#   on the identified root cause (focal_bce alpha asymmetry).
#
# What changes vs baseline.raw8.yaml:
#   extent_focal_alpha: 0.25 -> 0.50  (symmetric; no foreground/background bias)
#
# What does NOT change:
#   - loss head weights (extent=1.0, boundary=2.5, distance=1.0) — all identical to baseline
#   - architecture, optimizer, scheduler — all identical to baseline
#   - feature_mode, valid policy, dataset contract — unchanged
#
# See: extent_field_quality_improvement_report.md
# Baseline ref: configs/module_net_train/baseline.raw8.yaml

feature_mode: raw8
valid_as_input_channel: true  # must be True; DATA_CONTRACT.md §6.4, DEC-002

model:
  architecture: edge_aware_multitask_v1
  encoder_depth: 4
  base_channels: 32

loss:
  extent_weight: 1.0
  boundary_weight: 2.5
  distance_weight: 1.0
  aux_weight: 0.4
  boundary_lambda_skel_dice: 0.5
  extent_focal_alpha: 0.50   # symmetric — no foreground/background bias (vs 0.25 baseline)

optimizer:
  name: adamw
  lr: 0.0001
  weight_decay: 0.01

scheduler:
  name: cosine_with_warmup
  warmup_epochs: 5
  min_lr: 0.000001

training:
  batch_size: 8
  num_epochs: 20
  gradient_clip: 1.0
  amp: true
  seed: 42
  num_workers: 4
  gradient_accumulation_steps: 1
  device: null
  augment: true

monitoring:
  monitored_metric_name: composite_boundary_extent_f1
  monitored_metric_mode: max
