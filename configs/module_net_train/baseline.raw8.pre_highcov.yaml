# module_net_train baseline — raw8, PRE-HIGHCOV ARCHIVE
#
# Status: ARCHIVED REFERENCE — superseded 2026-04-17 by baseline.raw8.yaml
#         which now includes coverage-aware sampling.
#
# This file is the exact prior baseline configuration before the
# high-coverage sampling promotion. Preserved for:
#   - controlled comparison runs against the new baseline
#   - rollback reference if the promoted baseline is later superseded
#   - forensic audit of pre-promotion experiment results
#
# Superseded by: baseline.raw8.yaml (promoted 2026-04-17)
# Promotion report: module_net_train_highcov_baseline_promotion.md
#
# Reference runs (this config):
#   runs/module_net_train/net-train-raw8-ps256-scene03/  (canonical, composite=0.5590)
#   runs/module_net_train/auxctx-baseline-aux04-20ep/    (re-run, composite=0.5568)
#   runs/module_net_train/manual-baseline-full-20260417/ (re-run, composite=0.5481)
#
# DATA_CONTRACT.md §7.4, §7.5; DECISIONS.md DEC-003, DEC-008
# module_net_train.md §8.6 (loss weights baseline)

feature_mode: raw8
valid_as_input_channel: true  # must be True; DATA_CONTRACT.md §6.4, DEC-002

model:
  architecture: edge_aware_multitask_v1
  encoder_depth: 4
  base_channels: 32

loss:
  extent_weight: 1.0              # baseline v1
  boundary_weight: 2.5            # boundary is critical — higher weight
  distance_weight: 1.0
  aux_weight: 0.4                 # deep supervision auxiliary outputs
  boundary_lambda_skel_dice: 0.5  # module_net_train.md §22.1

optimizer:
  name: adamw
  lr: 0.0001
  weight_decay: 0.01

scheduler:
  name: cosine_with_warmup
  warmup_epochs: 5
  min_lr: 0.000001

training:
  batch_size: 8
  num_epochs: 20
  gradient_clip: 1.0
  amp: true
  seed: 42
  num_workers: 4
  gradient_accumulation_steps: 1
  device: null  # auto-detect: CUDA -> MPS -> CPU
  augment: true

monitoring:
  monitored_metric_name: composite_boundary_extent_f1
  monitored_metric_mode: max
