# module_net_train baseline configuration — raw8_idx3 feature mode
# Assembled model input: raw8_idx3_valid (8 spectral + NDVI + SAVI + NDWI + valid = 12 channels)
# DATA_CONTRACT.md §7.3, §7.4, §7.5; DECISIONS.md DEC-003

feature_mode: raw8_idx3
valid_as_input_channel: true  # must be True; DATA_CONTRACT.md §6.4, DEC-002

model:
  architecture: edge_aware_multitask_v1
  encoder_depth: 4
  base_channels: 32

loss:
  extent_weight: 1.0
  boundary_weight: 2.5
  distance_weight: 1.0
  aux_weight: 0.4
  boundary_lambda_skel_dice: 0.5  # module_net_train.md §22.1

optimizer:
  name: adamw
  lr: 0.0001
  weight_decay: 0.01

scheduler:
  name: cosine_with_warmup
  warmup_epochs: 5
  min_lr: 0.000001

training:
  batch_size: 8
  num_epochs: 20
  gradient_clip: 1.0
  amp: true
  seed: 42
  num_workers: 4
  gradient_accumulation_steps: 1
  device: null  # auto-detect: CUDA -> MPS -> CPU
  augment: true  # spatial augmentation on train split (module_net_train.md §11.2)

monitoring:
  monitored_metric_name: composite_boundary_extent_f1
  monitored_metric_mode: max
