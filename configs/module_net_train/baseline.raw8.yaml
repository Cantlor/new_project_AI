# module_net_train baseline configuration — raw8 + coverage-aware sampling
# Assembled model input: raw8_valid (8 spectral + valid = 9 channels)
# DATA_CONTRACT.md §7.4, §7.5; DECISIONS.md DEC-003, DEC-008
# module_net_train.md §8.6 (loss weights baseline)
#
# Promoted: 2026-04-17
# Promotion report: module_net_train_highcov_baseline_promotion.md
#
# What changed vs pre-highcov baseline (baseline.raw8.pre_highcov.yaml):
#   training.coverage_aware_sampling.enabled: false -> true
#   training.coverage_aware_sampling.bucket_weights.high: 1.0 -> 1.5
#   All other settings identical (architecture/loss/optimizer/scheduler unchanged)
#
# Evidence basis (manual full-run pair, 2026-04-17, same dataset/split):
#   Baseline (pre-highcov): composite=0.5481  bnd_f1=0.3046  gap=-0.046
#   This config (highcov):  composite=0.5626  bnd_f1=0.3276  gap=-0.036
#   Delta:                  +0.0145           +0.0230        +0.010
#
# Known limitations (documented, not disqualifying for practical baseline):
#   - High-bucket F1 at t=0.55: -0.0046 (recall -0.011, precision +0.003)
#   - Per-case tail-risk bidirectional: some patches recover, some worsen
#   - Root cause (geographic split mismatch) is unaddressed; next step is split-policy redesign
#   - Training variance ±0.010 composite across sessions with seed=42+AMP
#
# Archived pre-promotion config: baseline.raw8.pre_highcov.yaml

feature_mode: raw8
valid_as_input_channel: true  # must be True; DATA_CONTRACT.md §6.4, DEC-002

model:
  architecture: edge_aware_multitask_v1
  encoder_depth: 4
  base_channels: 32

loss:
  extent_weight: 1.0              # baseline v1
  boundary_weight: 2.5            # boundary is critical — higher weight
  distance_weight: 1.0
  aux_weight: 0.4                 # deep supervision auxiliary outputs
  boundary_lambda_skel_dice: 0.5  # module_net_train.md §22.1

optimizer:
  name: adamw
  lr: 0.0001
  weight_decay: 0.01

scheduler:
  name: cosine_with_warmup
  warmup_epochs: 5
  min_lr: 0.000001

training:
  batch_size: 8
  num_epochs: 20
  gradient_clip: 1.0
  amp: true
  seed: 42
  num_workers: 4
  gradient_accumulation_steps: 1
  device: null  # auto-detect: CUDA -> MPS -> CPU
  augment: true
  coverage_aware_sampling:
    enabled: true
    coverage_quantile_low: 0.3333333333
    coverage_quantile_high: 0.6666666667
    bucket_weights:
      low: 1.0
      medium: 1.0
      high: 1.5    # upweight high-coverage patches during training
    replacement: true

monitoring:
  monitored_metric_name: composite_boundary_extent_f1
  monitored_metric_mode: max
