# module_net_train extent-mask-like profile
#
# Purpose: produce tighter, less over-inclusive extent predictions
# ("extent mask like" rather than "too soft / too buffered")
#
# Background:
#   The baseline config (baseline.raw8.yaml) uses focal_bce with alpha=0.25 in the
#   extent head. This assigns 3× more gradient weight to background than to foreground
#   field pixels, causing the model to produce soft, over-inclusive extent predictions
#   (recall >> precision at the field boundary).
#
# Fix applied here (from extent_mask_comparison_report.md §7, Run B):
#   extent_weight: 1.0 -> 1.5  (stronger crisp extent gradient signal)
#   boundary_weight: 2.5 -> 2.25  (modest reduction to rebalance total gradient)
#
# Empirical effect (5-epoch ps256 experiment, Run B vs Run A):
#   precision-recall gap:  -0.039 -> +0.003  (gap nearly eliminated)
#   composite metric:       0.4934 -> 0.5028  (+1.9%)
#   boundary_f1:            0.2234 -> 0.2487  (+11%)
#
# What is NOT changed:
#   - focal_bce alpha (remains 0.25) — a separate ablation; see caveats in report
#   - architecture, optimizer, scheduler — all identical to baseline
#   - valid-policy — unchanged (DATA_CONTRACT.md §6.4, DEC-002)
#
# DATA_CONTRACT.md §7.4, §7.5; DECISIONS.md DEC-003, DEC-008

feature_mode: raw8
valid_as_input_channel: true  # must be True; DATA_CONTRACT.md §6.4, DEC-002

model:
  architecture: edge_aware_multitask_v1
  encoder_depth: 4
  base_channels: 32

loss:
  extent_weight: 1.5              # increased from 1.0 baseline — tighter extent predictions
  boundary_weight: 2.25           # reduced from 2.5 baseline — modest rebalancing
  distance_weight: 1.0
  aux_weight: 0.4
  boundary_lambda_skel_dice: 0.5

optimizer:
  name: adamw
  lr: 0.0001
  weight_decay: 0.01

scheduler:
  name: cosine_with_warmup
  warmup_epochs: 5
  min_lr: 0.000001

training:
  batch_size: 8
  num_epochs: 20
  gradient_clip: 1.0
  amp: true
  seed: 42
  num_workers: 4
  gradient_accumulation_steps: 1
  device: null  # auto-detect: CUDA -> MPS -> CPU
  augment: true

monitoring:
  monitored_metric_name: composite_boundary_extent_f1
  monitored_metric_mode: max
